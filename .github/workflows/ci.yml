name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_postgres:
        description: Run the gated Prisma/Postgres persistence test
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_integration:
        description: Run the gated apply→install→verify integration test
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  PNPM_VERSION: "9.0.0"

jobs:
  # Default checks: fast, hermetic, no external services or secrets required.
  verify:
    name: build · typecheck · test · diff (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Exercise the supported floor (latest 20.x, engines >=20.10) and the
        # current line maintainers actually develop on (24.x).
        node: ["20", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Arch-bench validation gates (fast, hermetic)
        run: |
          pnpm exec tsx packages/arch-bench/src/main.ts validate --strict
          pnpm exec tsx packages/arch-bench/src/main.ts external validate
          pnpm exec tsx packages/arch-bench/src/main.ts external lock --check

      - name: Goldens are deterministic
        run: |
          pnpm update-goldens
          git diff --exit-code || {
            echo "::error::pnpm update-goldens produced changes — commit updated snapshots.";
            exit 1;
          }

      - name: Whitespace / conflict-marker check
        run: git diff --check

  # The SocialFeed e2e transcript. Heavier (it really installs the generated
  # project), but hermetic and deterministic — runs on every push/PR.
  e2e:
    name: e2e (SocialFeed transcript)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run e2e
        run: pnpm e2e

  # Arch-bench smoke: the deterministic-baseline smoke run plus the gated
  # bench test tier (ARCH_BENCH_SMOKE=1). Heavier — it really installs generated
  # projects in temp workspaces — but hermetic: no external services or secrets.
  # The Postgres-backed db-check test stays skipped here (no DATABASE_URL).
  bench-smoke:
    name: bench (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: bench smoke run (deterministic baselines)
        run: pnpm bench:smoke
      - name: bench smoke tests (real Arch CLI, no DB)
        env:
          ARCH_BENCH_SMOKE: "1"
        run: pnpm --filter @arch/bench test

  # Gated apply→install→verify integration test (workflow_dispatch opt-in).
  integration:
    name: integration (apply · verify)
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: apply→install→verify
        env:
          ARCH_RUN_INTEGRATION: "1"
        run: pnpm --filter @arch/cli test -- src/__tests__/apply-verify.test.ts

  # Gated real Postgres persistence test (workflow_dispatch opt-in). Uses a
  # service container — no secrets required.
  postgres:
    name: persistence (real Postgres)
    if: github.event_name == 'workflow_dispatch' && inputs.run_postgres == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arch
          POSTGRES_PASSWORD: arch
          POSTGRES_DB: arch_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ARCH_RUN_POSTGRES: "1"
      DATABASE_URL: postgres://arch:arch@localhost:5432/arch_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: |
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: create→read through Prisma/Postgres
        run: pnpm --filter @arch/cli test -- src/__tests__/prisma-postgres.test.ts
