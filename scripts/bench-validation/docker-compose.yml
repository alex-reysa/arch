# Throwaway Postgres for Arch bench validation/migration runs.
#
# The migration dbCheck RESETS the `public` schema of the target database, so
# this MUST point at a disposable database — never a real one. Default port is
# 55432 to avoid clashing with a local Postgres on 5432.
#
#   docker compose -f scripts/bench-validation/docker-compose.yml up -d
#   ARCH_BENCH_DATABASE_URL=postgres://arch:arch@localhost:55432/arch_bench ...
#   docker compose -f scripts/bench-validation/docker-compose.yml down -v
services:
  bench-postgres:
    image: postgres:16-alpine
    container_name: arch-bench-pg
    environment:
      POSTGRES_USER: arch
      POSTGRES_PASSWORD: arch
      POSTGRES_DB: arch_bench
    ports:
      - "55432:5432"
    tmpfs:
      # Ephemeral storage: nothing survives a `down`. Reinforces "throwaway".
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arch -d arch_bench"]
      interval: 2s
      timeout: 5s
      retries: 30
